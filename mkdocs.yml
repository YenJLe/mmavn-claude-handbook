site_name: MMA Vietnam Claude Handbook
site_description: The MMA team's guide to using Claude for everyday work.
site_author: MMA Vietnam
site_url: https://yenjle.github.io/mmavn-claude-handbook/
repo_url: https://github.com/YenJLe/mmavn-claude-handbook
repo_name: YenJLe/mmavn-claude-handbook
copyright: Internal knowledge base. MMA Vietnam.

docs_dir: docs

theme:
  name: material
  logo: assets/mma-logo.svg
  favicon: assets/favicon.png
  palette:
    scheme: default
    primary: black
    accent: amber
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Claude 101: claude-101.md
  - Desktop App Tour: desktop-tour.md
  - Prompting Basics: prompting.md
  - Use Cases by Role: use-cases.md
