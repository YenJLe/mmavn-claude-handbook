site_name: MMA Vietnam Claude Handbook
site_description: The MMA team's guide to using Claude for everyday work.
site_author: MMA Vietnam
site_url: https://yenjle.github.io/mmavn-claude-handbook/
copyright: Prepared by Yen, internal use only.

docs_dir: docs

theme:
  name: material
  logo: assets/mma-logo.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/header_title.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Claude 101: claude-101.md
  - MMA Skills: skills.md
  - Desktop App Tour: desktop-tour.md
  - Projects: projects.md
  - Claude Cowork: cowork.md
  - Claude in Office: claude-in-office.md
  - Prompting Basics: prompting.md
